name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore PlayZone.PL/PlayZone.PL.csproj

      - name: Build
        run: dotnet build PlayZone.PL/PlayZone.PL.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish PlayZone.PL/PlayZone.PL.csproj --configuration Release --output ./publish --no-build

      - name: .NET Lint
        uses: zyactions/dotnet-lint@v1
        with:
          workspace: PlayZone.sln
          implicit-restore: true

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ayeshaazad/play-zone:latest
